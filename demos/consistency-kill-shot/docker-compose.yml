# The stitched pipeline under test: four best-of-breed stores, each excellent
# alone, wired the way production RAG/search pipelines actually wire them —
# with nothing above them that can make a cross-store write atomic.
#
# Versions are pinned exactly. Every store runs with its vendor defaults for
# durability and visibility; where a default would hide writes from readers
# (Elasticsearch's refresh interval), the DRIVER requests immediate
# visibility per-write, so no anomaly below can be blamed on tuning.
services:
  postgres:
    image: postgres:16.13-alpine
    environment:
      POSTGRES_USER: killshot
      POSTGRES_PASSWORD: killshot
      POSTGRES_DB: killshot
    ports:
      - "15432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U killshot"]
      interval: 2s
      timeout: 2s
      retries: 30

  qdrant:
    image: qdrant/qdrant:v1.18.0
    ports:
      - "16333:6333"
    healthcheck:
      test: ["CMD-SHELL", "bash -c ':> /dev/tcp/127.0.0.1/6333'"]
      interval: 2s
      timeout: 2s
      retries: 30

  elasticsearch:
    image: elasticsearch:9.2.4
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms1g -Xmx1g"
    ports:
      - "19200:9200"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 2s
      timeout: 2s
      retries: 60

  neo4j:
    image: neo4j:5.26.28-community
    environment:
      NEO4J_AUTH: neo4j/killshotpass
    ports:
      - "17687:7687"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 || exit 1"]
      interval: 2s
      timeout: 2s
      retries: 60
